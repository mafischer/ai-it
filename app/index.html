<!DOCTYPE html>
<html>
<head>
  <title>AI-IT</title>
  <link href="https://cdn.jsdelivr.net/npm/vuetify@3.7.6/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue-router@4.5.0/dist/vue-router.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vuetify@3.7.6/dist/vuetify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="chat.js"></script>

<script>
const { createApp, ref, computed, onMounted, onUnmounted, watch } = Vue;
const { createRouter, createWebHashHistory, useRouter, useRoute } = VueRouter;
const { createVuetify } = Vuetify;

const EMOJIS = {
  business_analyst: "\u{1F4CB}", software_architect: "\u{1F3D7}\uFE0F",
  backend_software_engineer: "\u2699\uFE0F", frontend_software_engineer: "\u{1F5A5}\uFE0F",
  ux_designer: "\u{1F3A8}", quality_engineer: "\u{1F50D}",
  site_reliability_engineer: "\u{1F4C8}", devops_engineer: "\u{1F680}",
  support_engineer: "\u{1F6E0}\uFE0F", complete: "\u2705"
};

function agentName(id) {
  return (id || "").replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function statusColor(status) {
  if (!status) return "grey";
  if (status.includes("COMPLETE") || status.includes("PASSED") || status.includes("APPROVED") || status.includes("DRAFTED")) return "success";
  if (status.includes("AMBIGUOUS")) return "warning";
  return "error";
}

function extractStatus(content) {
  const matches = [...(content || "").matchAll(/STATUS:\s*([A-Z_]+)/g)];
  return matches.length ? matches[matches.length - 1][1] : "";
}

// ── Thread List ──────────────────────────────────────────────────────────────
const ThreadList = {
  template: `
    <v-container fluid>
      <div class="d-flex align-center mb-6">
        <v-icon size="32" color="primary" class="mr-3" style="cursor:pointer" @click="$router.push('/')">mdi-brain</v-icon>
        <h1 class="text-h4 font-weight-bold">AI-IT Conversations</h1>
        <v-spacer />
        <v-btn color="error" variant="outlined" prepend-icon="mdi-delete-sweep" @click="deleteAll" :disabled="!threads.length">
          Delete All
        </v-btn>
      </div>

      <v-progress-linear v-if="loading" indeterminate color="primary" class="mb-4" />

      <v-card v-if="!loading && !threads.length" variant="tonal" color="surface-variant" class="pa-8 text-center">
        <v-icon size="48" color="grey">mdi-chat-sleep-outline</v-icon>
        <div class="text-body-1 mt-3 text-grey">No conversations yet.</div>
      </v-card>

      <div v-for="t in threads" :key="t.thread_id" class="d-flex align-center ga-3 mb-3">
        <v-card class="flex-grow-1" :border="isActive(t.thread_id) ? 'primary md' : ''" elevation="3" hover @click="$router.push('/admin/thread/' + t.thread_id)">
          <v-card-text>
            <div class="d-flex align-center">
              <code class="text-caption text-medium-emphasis mr-3">{{ t.thread_id }}</code>
              <v-progress-circular v-if="isActive(t.thread_id)" indeterminate size="16" width="2" color="primary" class="mr-2" />
              <v-chip v-if="isActive(t.thread_id)" size="x-small" color="primary" variant="tonal">active</v-chip>
            </div>
            <div class="text-body-1 mt-1 font-weight-medium">{{ t.title || t.directive }}</div>
            <div class="d-flex align-center mt-2 ga-2 flex-wrap">
              <v-chip size="small" variant="tonal" prepend-icon="mdi-message-outline">{{ t.msgCount }} messages</v-chip>
              <v-chip v-for="a in t.agents" :key="a" size="small" color="primary" variant="outlined">{{ emoji(a) }} {{ agentName(a) }}</v-chip>
            </div>
        </v-card-text>
        </v-card>
        <v-btn rounded="pill" size="small" variant="tonal" color="error" icon="mdi-delete" @click.stop="deleteThread(t.thread_id)" />
      </div>
    </v-container>
  `,
  setup() {
    const threads = ref([]);
    const activeIds = ref([]);
    const loading = ref(true);
    let poll;

    async function fetchData() {
      try {
        const [tr, ar] = await Promise.all([fetch("/api/threads"), fetch("/api/active")]);
        threads.value = await tr.json();
        activeIds.value = (await ar.json()).map(i => i.thread_id);
      } catch {} finally { loading.value = false; }
    }

    function isActive(tid) { return activeIds.value.includes(tid); }
    function emoji(id) { return EMOJIS[id] || "\u{1F916}"; }

    async function deleteThread(tid) {
      if (!confirm("Delete this conversation?")) return;
      await fetch("/api/threads/" + tid, { method: "DELETE" });
      fetchData();
    }

    async function deleteAll() {
      if (!confirm("Delete ALL conversations?")) return;
      await fetch("/api/threads", { method: "DELETE" });
      fetchData();
    }

    onMounted(() => { fetchData(); poll = setInterval(fetchData, 3000); });
    onUnmounted(() => clearInterval(poll));

    return { threads, loading, isActive, emoji, agentName, deleteThread, deleteAll };
  }
};

// ── Thread Detail ────────────────────────────────────────────────────────────
const ThreadDetail = {
  template: `
    <v-container fluid>
      <v-btn variant="text" prepend-icon="mdi-arrow-left" @click="$router.push('/admin')" class="mb-3">All Conversations</v-btn>

      <div class="d-flex align-center mb-4">
        <h1 class="text-h5 font-weight-bold">Thread {{ threadId }}</h1>
        <v-progress-circular v-if="active" indeterminate size="20" width="2" color="primary" class="ml-3" />
        <v-spacer />
        <v-btn v-if="active" color="error" variant="flat" prepend-icon="mdi-stop" @click="abortThread">Abort</v-btn>
      </div>

      <div class="d-flex align-center mb-4">
        <v-chip variant="tonal" size="small" prepend-icon="mdi-database">
          {{ messages.length }} messages in latest state
        </v-chip>
        <v-spacer></v-spacer>
        <v-btn size="small" variant="tonal" :prepend-icon="allExpanded ? 'mdi-collapse-all' : 'mdi-expand-all'" @click="toggleAllMessages">
          {{ allExpanded ? 'Collapse All' : 'Expand All' }}
        </v-btn>
      </div>

      <v-progress-linear v-if="loading" indeterminate color="primary" class="mb-4" />

      <div v-for="(m, i) in messages" :key="i" class="d-flex align-center ga-3 mb-3">
        <v-card class="flex-grow-1"
          :border="m.role === 'user' ? 'success sm' : 'info sm'" elevation="3">
          <v-card-text>
            <div class="d-flex align-center mb-2" style="cursor: pointer;" @click="m._msgOpen = m._msgOpen === false ? true : false">
              <v-chip :color="m.role === 'user' ? 'success' : (m.role === 'system' ? 'warning' : 'primary')" :variant="m.role === 'system' ? 'tonal' : 'flat'" size="small" class="mr-2">
                {{ msgEmoji(m) }} <template v-if="m.role === 'system'">System prompt to {{ agentName(m.name) }}</template><template v-else>{{ agentName(m.name) || m.role }}</template>
              </v-chip>
              <v-progress-circular v-if="m._streaming" indeterminate size="16" width="2" color="primary" class="mr-2"></v-progress-circular>
              <v-chip v-if="msgStatus(m)" :color="statusColor(msgStatus(m))" size="x-small" variant="tonal" class="mr-2">
                {{ msgStatus(m) }}
              </v-chip>
              <v-spacer></v-spacer>
              <v-btn icon size="x-small" variant="text" @click.stop="m._msgOpen = m._msgOpen === false ? true : false">
                <v-icon>{{ m._msgOpen === false ? 'mdi-chevron-down' : 'mdi-chevron-up' }}</v-icon>
              </v-btn>
            </div>
            <div v-show="m._msgOpen !== false">
              <!-- Thinking section (parsed from <think> tags in content) -->
              <v-card v-if="m._thinking" variant="outlined" class="mb-2" rounded="lg">
                <v-card-text class="pa-2">
                  <div class="d-flex align-center cursor-pointer" @click="m._thinkOpen = !m._thinkOpen; m._userToggledThink = true">
                    <v-icon size="small" class="mr-2">{{ m._thinkOpen ? 'mdi-chevron-down' : 'mdi-chevron-right' }}</v-icon>
                    <span class="text-caption text-medium-emphasis">Thinking</span>
                  </div>
                  <div v-if="m._thinkOpen" class="md-content mt-2 text-medium-emphasis" style="font-size:0.8rem" v-html="renderMd(m._thinking)"></div>
                </v-card-text>
              </v-card>
              <div class="md-content" v-html="renderMd(m._displayContent || m.content)"></div>
            </div>
          </v-card-text>
        </v-card>
        <v-btn v-if="!active" rounded="pill" size="small" variant="tonal" color="primary" icon="mdi-skip-backward"
          @click="rewind(i)" title="Rewind to this point" />
      </div>

      <!-- Skeleton for active processing -->
      <v-card v-if="active" border="info sm" elevation="3" class="mb-3">
        <v-card-text>
          <div class="d-flex align-center mb-3">
            <v-chip color="primary" variant="flat" size="small">
              {{ activeAgent ? (emoji(activeAgent) + ' ' + agentName(activeAgent)) : 'Processing' }}...
            </v-chip>
          </div>
          <v-skeleton-loader type="paragraph" />
        </v-card-text>
      </v-card>
    </v-container>
  `,
  setup() {
    const route = useRoute();
    const threadId = route.params.id;
    const messages = ref([]);
    const loading = ref(true);
    const active = ref(false);
    const activeAgent = ref(null);
    let poll;

    function parseThinking(content) {
      if (!content) return { thinking: null, display: content };
      const match = content.match(/<think>([\s\S]*?)<\/think>/);
      if (match) {
        return { thinking: match[1].trim(), display: content.replace(/<think>[\s\S]*?<\/think>/, "").replace(/<\/?think>/g, "").trim() };
      }
      return { thinking: null, display: content };
    }

    let isStreaming = false;

    async function fetchMessages() {
      if (isStreaming) return; // Don't clobber state while streaming
      try {
        const r = await fetch("/api/threads/" + threadId + "/messages");
        if (r.ok) {
          const msgs = await r.json();
          // Preserve existing reactive state for messages already rendered
          const existing = new Map(messages.value.map((m, i) => [i, m]));
          messages.value = msgs.map((m, i) => {
            const { thinking, display } = parseThinking(m.content);
            const prev = existing.get(i);
            // Preserve user-toggled state if content hasn't changed
            if (prev && prev.content === m.content) {
              prev._thinking = thinking;
              prev._displayContent = display;
              if (prev._msgOpen === undefined) prev._msgOpen = false;
              return prev;
            }
            return { ...m, _thinking: thinking, _displayContent: display, _thinkOpen: false, _msgOpen: false, _streaming: false };
          });
        }
      } catch {} finally { loading.value = false; }
    }

    async function fetchActive() {
      try {
        const r = await fetch("/api/active");
        const items = await r.json();
        const entry = items.find(i => i.thread_id === threadId);
        active.value = !!entry;
        activeAgent.value = entry?.agent || null;
      } catch {}
    }

    async function pollAll() { await Promise.all([fetchMessages(), fetchActive()]); }

    function msgEmoji(m) { return m.role === "system" ? "➡️" : (EMOJIS[m.name] || (m.role === "user" ? "\u{1F464}" : "\u{1F916}")); }
    function msgStatus(m) { return m.role === "system" ? "" : extractStatus(m.content); }
    function emoji(id) { return EMOJIS[id] || "\u{1F916}"; }
    function renderMd(text) { if (!text) return ""; try { return marked.parse(text, { breaks: true }); } catch { return text; } }

    const allExpanded = computed(() => messages.value.length > 0 && messages.value.every(m => m._msgOpen !== false));

    function toggleAllMessages() {
      const targetState = !allExpanded.value;
      messages.value.forEach(m => m._msgOpen = targetState);
    }

    async function rewind(i) {
      if (!confirm("Rewind to message " + i + " and re-run?")) return;
      const r = await fetch("/api/threads/" + threadId + "/rewind", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messageIndex: i })
      });
      const d = await r.json();
      alert(d.message || d.error);
      pollAll();
    }

    async function abortThread() {
      if (!confirm("Abort active workflow?")) return;
      const r = await fetch("/api/threads/" + threadId + "/abort", { method: "POST" });
      const d = await r.json();
      alert(d.message || d.error);
      pollAll();
    }

    let streamReader = null;

    async function connectStream() {
      isStreaming = true;
      try {
        const resp = await fetch("/api/threads/" + threadId + "/stream");
        if (!resp.ok) { isStreaming = false; return; }
        const reader = resp.body.getReader();
        streamReader = reader;
        const dec = new TextDecoder();
        let buffer = "";
        let currentAgent = null;
        let thinkBuf = "", contentBuf = "", inThink = false;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += dec.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ") || line === "data: [DONE]") continue;
            try {
              const data = JSON.parse(line.slice(6));
              const deltaObj = data.choices?.[0]?.delta || {};

              // System prompt from prompt node
              if (deltaObj.system_prompt) {
                const agentId = deltaObj.agent || "";
                const exists = messages.value.some(m => m.type === "prompt" && m.name === agentId);
                if (!exists) {
                  messages.value.push({ role: "system", name: agentId, content: deltaObj.system_prompt, type: "prompt", _thinking: null, _displayContent: deltaObj.system_prompt, _thinkOpen: false });
                }
                // Add streaming agent message
                currentAgent = agentId;
                inThink = false; thinkBuf = ""; contentBuf = "";
                const agentExists = messages.value.some(m => m.role === "assistant" && m.name === agentId && m.type !== "prompt");
                if (!agentExists) {
                  messages.value.push({ role: "assistant", name: agentId, content: "", _thinking: null, _displayContent: "", _thinkOpen: true, _streaming: true });
                }
                continue;
              }

              const delta = deltaObj.content || "";
              if (!delta) continue;

              // Find or create the streaming message
              let streamMsg = messages.value.findLast(m => m._streaming);
              if (!streamMsg && currentAgent) {
                streamMsg = { role: "assistant", name: currentAgent, content: "", _thinking: null, _displayContent: "", _thinkOpen: true, _streaming: true };
                messages.value.push(streamMsg);
              }
              if (!streamMsg) continue;

              for (let i = 0; i < delta.length; i++) {
                const remaining = delta.slice(i);
                if (!inThink && remaining.startsWith("<think>")) { inThink = true; if (!streamMsg._userToggledThink) streamMsg._thinkOpen = true; i += 6; continue; }
                if (inThink && remaining.startsWith("</think>")) { inThink = false; streamMsg._thinking = thinkBuf; if (!streamMsg._userToggledThink) streamMsg._thinkOpen = false; i += 7; continue; }
                if (inThink) { thinkBuf += delta[i]; streamMsg._thinking = thinkBuf; }
                else { contentBuf += delta[i]; streamMsg._displayContent = contentBuf; streamMsg.content = contentBuf; }
              }
            } catch {}
          }
        }
      } catch {} finally {
        isStreaming = false;
        // Finalize any streaming messages
        messages.value.forEach(m => { if (m._streaming) m._streaming = false; });
        fetchMessages(); // Load final state from DB
      }
    }

    onMounted(async () => {
      await pollAll();
      if (active.value) connectStream();
      poll = setInterval(pollAll, 2000);
    });
    onUnmounted(() => {
      clearInterval(poll);
      if (streamReader) { try { streamReader.cancel(); } catch {} }
    });

    return { threadId, messages, loading, active, activeAgent, msgEmoji, msgStatus, emoji, agentName, statusColor, renderMd, rewind, abortThread, allExpanded, toggleAllMessages };
  }
};

// ── Router & App ─────────────────────────────────────────────────────────────
const router = createRouter({
  history: createWebHashHistory(),
  routes: [
    { path: "/", component: window.ChatView },
    { path: "/admin", component: ThreadList },
    { path: "/admin/thread/:id", component: ThreadDetail },
  ]
});

const vuetify = createVuetify({
  theme: {
    defaultTheme: "dark",
    themes: {
      dark: {
        colors: { primary: "#58a6ff", surface: "#1e1e2e", background: "#11111b", "surface-variant": "#313244", "on-surface": "#cdd6f4" }
      }
    }
  }
});

const app = createApp({
  template: `
    <v-app>
      <v-main>
        <router-view />
      </v-main>
    </v-app>
  `
});
app.use(router);
app.use(vuetify);
app.mount("#app");
</script>

<style>

  white-space: pre-wrap;
  word-break: break-word;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 0.875rem;
  line-height: 1.6;
  margin: 0;
}
.cursor-pointer { cursor: pointer; }

/* Markdown rendered content */
.md-content { font-size: 0.9rem; line-height: 1.7; word-break: break-word; }
.md-content p { margin-bottom: 0.75em; }
.md-content p:last-child { margin-bottom: 0; }
.md-content h1, .md-content h2, .md-content h3, .md-content h4 { margin: 1em 0 0.5em; font-weight: 600; color: #cdd6f4; }
.md-content h1 { font-size: 1.4rem; }
.md-content h2 { font-size: 1.2rem; }
.md-content h3 { font-size: 1.05rem; }
.md-content h4 { font-size: 0.95rem; }
.md-content ul, .md-content ol { margin: 0.5em 0; padding-left: 1.5em; }
.md-content li { margin-bottom: 0.3em; }
.md-content code { background: #313244; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.85em; }
.md-content pre { background: #181825; border: 1px solid #313244; border-radius: 8px; padding: 1em; overflow-x: auto; margin: 0.75em 0; }
.md-content pre code { background: none; padding: 0; font-size: 0.85em; }
.md-content blockquote { border-left: 3px solid #58a6ff; padding: 0.5em 1em; margin: 0.75em 0; color: #a6adc8; }

.md-content th, .md-content td { border: 1px solid #313244; padding: 0.4em 0.75em; text-align: left; }
.md-content th { background: #1e1e2e; font-weight: 600; }
.md-content hr { border: none; border-top: 1px solid #313244; margin: 1em 0; }

.md-content strong { color: #cdd6f4; }

*, *::before, *::after {
  scrollbar-width: none !important;
}

  display: none !important;
}
</style>
</body>
</html>
