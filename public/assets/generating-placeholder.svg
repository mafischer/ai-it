<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="100%" height="100%" fill="#11111b" />
  
  <g transform="translate(400, 270)">
    <!-- Loading Spinner -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#313244" stroke-width="6" />
    <path d="M 0 -30 A 30 30 0 0 1 30 0" fill="none" stroke="#58a6ff" stroke-width="6" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="1s" repeatCount="indefinite" />
    </path>
    
    <!-- Text -->
    <text x="0" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#cdd6f4" text-anchor="middle" letter-spacing="1.5">
      Image generating...
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a6adc8" text-anchor="middle" opacity="0.7">
      ComfyUI Flux pipeline is processing your request
    </text>
  </g>
</svg>