<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-IT Organization Hub</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f4f9; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #header { background: #333; color: white; padding: 1rem; text-align: center; font-weight: bold; font-size: 1.2rem; }
        #chat { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .message { padding: 0.8rem 1.2rem; border-radius: 8px; max-width: 80%; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; font-family: 'Courier New', Courier, monospace; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .agent { background: white; color: #333; align-self: flex-start; border: 1px solid #ddd; }
        .pm-decision { background: #fff3cd; border: 1px solid #ffeeba; color: #856404; align-self: center; font-size: 0.85rem; text-align: center; }
        .node-start { align-self: center; color: #666; font-size: 0.8rem; font-style: italic; }
        #input-area { background: white; padding: 1rem; border-top: 1px solid #ddd; display: flex; gap: 0.5rem; }
        #message-input { flex: 1; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        #send-btn { padding: 0.8rem 1.5rem; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #send-btn:disabled { background: #ccc; }
        code { background: #eee; padding: 2px 4px; border-radius: 4px; }
        pre { background: #272822; color: #f8f8f2; padding: 10px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
    <div id="header">🤖 AI-IT: Agentic Technology Organization</div>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Enter a directive (e.g., 'Build a login system')..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('message-input');
        const btn = document.getElementById('send-btn');

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            btn.disabled = true;

            // Add User Message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.textContent = message;
            chat.appendChild(userMsg);
            chat.scrollTop = chat.scrollHeight;

            let currentAgentDiv = null;

            try {
                const response = await fetch('http://localhost:3000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));

                            if (data.type === 'node_start') {
                                const nodeDiv = document.createElement('div');
                                nodeDiv.className = 'node-start';
                                nodeDiv.textContent = `--- ${data.node} is thinking ---`;
                                chat.appendChild(nodeDiv);
                                
                                // Reset the current agent message div for new speaker
                                currentAgentDiv = document.createElement('div');
                                currentAgentDiv.className = 'message agent';
                                chat.appendChild(currentAgentDiv);
                            }

                            if (data.type === 'token') {
                                if (currentAgentDiv) {
                                    currentAgentDiv.textContent += data.content;
                                }
                            }

                            if (data.type === 'pm_decision') {
                                const pmDiv = document.createElement('div');
                                pmDiv.className = 'message pm-decision';
                                pmDiv.textContent = `[PM DECISION]: Route to ${data.decision}. \n Reasoning: ${data.reasoning}`;
                                chat.appendChild(pmDiv);
                            }

                            if (data.type === 'done') {
                                btn.disabled = false;
                            }
                            chat.scrollTop = chat.scrollHeight;
                        }
                    }
                }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
            }
        }

        btn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
